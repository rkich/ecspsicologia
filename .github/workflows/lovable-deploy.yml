name: "Build e Deploy para stable-website"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4
      
      - name: "Configurar Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: "Instalar Dependencias"
        run: bun install --frozen-lockfile
      
      - name: "Rodar Build"
        run: bun run build
      
      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: stable-website
          folder: dist
          clean: true
